<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Data Janitor & Orchestrator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent: #00ff9d; --accent-dim: rgba(0,255,157,0.12);
      --accent-glow: rgba(0,255,157,0.35); --text: #e8e8f0;
      --muted: #5a5a7a; --error: #ff4d6d; --success: #00ff9d;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px 40px; width: 100%; max-width: 400px; position: relative; z-index: 1; animation: fadeUp 0.5s ease both; }
    .card::before { content: ''; position: absolute; inset: 0; border-radius: 8px; background: radial-gradient(ellipse at 50% 0%, var(--accent-dim), transparent 70%); pointer-events: none; }
    .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-family: var(--mono); font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 36px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 13px; transition: all 0.2s; outline: none; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
    .error-msg { background: rgba(255,77,109,0.08); border: 1px solid var(--error); border-radius: 4px; padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--error); margin-bottom: 20px; }
    .success-msg { background: rgba(0,255,157,0.08); border: 1px solid var(--success); border-radius: 4px; padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--success); margin-bottom: 20px; }
    .btn { width: 100%; padding: 14px; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .btn:hover { box-shadow: 0 0 24px var(--accent-glow); transform: translateY(-1px); }
    .link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .link a { color: var(--accent); text-decoration: none; }
    .link a:hover { text-decoration: underline; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <div style="display:flex;justify-content:center;margin-bottom:20px;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="80" height="80">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#111118"/><stop offset="100%" stop-color="#0a0a0f"/></radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00ff9d" stop-opacity="0.15"/><stop offset="100%" stop-color="#00ff9d" stop-opacity="0"/></radialGradient>
    <filter id="tg3" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="lg3" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="cc3"><circle cx="200" cy="200" r="180"/></clipPath>
  </defs>
  <circle cx="200" cy="200" r="200" fill="#0a0a0f"/>
  <circle cx="200" cy="200" r="200" fill="url(#bg3)"/>
  <circle cx="200" cy="200" r="180" fill="url(#glow3)"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="#1e1e2e" stroke-width="1.5"/>
  <g clip-path="url(#cc3)" opacity="0.07">
    <line x1="20" y1="100" x2="380" y2="100" stroke="#00ff9d" stroke-width="0.8"/>
    <line x1="20" y1="200" x2="380" y2="200" stroke="#00ff9d" stroke-width="0.8"/>
    <line x1="20" y1="300" x2="380" y2="300" stroke="#00ff9d" stroke-width="0.8"/>
    <line x1="100" y1="20" x2="100" y2="380" stroke="#00ff9d" stroke-width="0.8"/>
    <line x1="200" y1="20" x2="200" y2="380" stroke="#00ff9d" stroke-width="0.8"/>
    <line x1="300" y1="20" x2="300" y2="380" stroke="#00ff9d" stroke-width="0.8"/>
  </g>
  <polygon points="200,48 330,124 330,276 200,352 70,276 70,124" fill="none" stroke="#1e1e2e" stroke-width="1.5" filter="url(#lg3)"/>
  <polygon points="200,82 306,141 306,259 200,318 94,259 94,141" fill="none" stroke="#00ff9d" stroke-width="0.8" opacity="0.25"/>
  <line x1="70" y1="124" x2="50" y2="104" stroke="#00ff9d" stroke-width="1.5" filter="url(#lg3)" opacity="0.6"/>
  <line x1="70" y1="124" x2="44" y2="124" stroke="#00ff9d" stroke-width="1.5" filter="url(#lg3)" opacity="0.6"/>
  <line x1="330" y1="276" x2="350" y2="296" stroke="#00ff9d" stroke-width="1.5" filter="url(#lg3)" opacity="0.6"/>
  <line x1="330" y1="276" x2="356" y2="276" stroke="#00ff9d" stroke-width="1.5" filter="url(#lg3)" opacity="0.6"/>
  <line x1="118" y1="312" x2="282" y2="312" stroke="#00ff9d" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
  <circle cx="118" cy="312" r="5" fill="#0a0a0f" stroke="#00ff9d" stroke-width="1.5" opacity="0.8"/>
  <circle cx="118" cy="312" r="2" fill="#00ff9d" opacity="0.9"/>
  <circle cx="200" cy="312" r="5" fill="#0a0a0f" stroke="#00ff9d" stroke-width="1.5" opacity="0.8"/>
  <circle cx="200" cy="312" r="2" fill="#00ff9d" opacity="0.9"/>
  <circle cx="282" cy="312" r="5" fill="#0a0a0f" stroke="#00ff9d" stroke-width="1.5" opacity="0.8"/>
  <circle cx="282" cy="312" r="2" fill="#00ff9d" opacity="0.9"/>
  <text x="200" y="226" font-family="Courier New,monospace" font-size="88" font-weight="700" fill="#00ff9d" text-anchor="middle" dominant-baseline="middle" letter-spacing="-4" filter="url(#tg3)">DJ&amp;O</text>
  <text x="200" y="272" font-family="Courier New,monospace" font-size="13" fill="#5a5a7a" text-anchor="middle" dominant-baseline="middle" letter-spacing="6">MULTI-AGENT SYSTEM</text>
  <line x1="200" y1="22" x2="200" y2="36" stroke="#00ff9d" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="364" x2="200" y2="378" stroke="#00ff9d" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="29" r="2" fill="#00ff9d" opacity="0.8"/>
  <circle cx="200" cy="371" r="2" fill="#00ff9d" opacity="0.8"/>
</svg></div>
    <div class="logo">Multi-Agent System</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access the pipeline</p>
    {% if registered %}<div class="success-msg">✅ Account created! Sign in below.</div>{% endif %}
    {% if error %}<div class="error-msg">❌ {{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <div class="link">Don't have an account? <a href="/register">Register</a></div>
  </div>
</body>
</html>
