services:
  - type: web
    name: data-janitor-orchestrator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    plan: starter  # paid plan
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Set this manually in Render dashboard — never commit it
      - key: APP_USERNAME
        sync: false  # Your login username
      - key: APP_PASSWORD
        sync: false  # Your login password
      - key: SECRET_KEY
        sync: false  # Flask session secret key
      - key: PYTHON_VERSION
        value: 3.12.0
