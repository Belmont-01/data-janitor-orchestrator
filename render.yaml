databases:
  - name: data-janitor-db
    plan: free

services:
  - type: web
    name: data-janitor-orchestrator
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2 --keep-alive 5
    plan: starter
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: data-janitor-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: RENDER
        value: "true"
