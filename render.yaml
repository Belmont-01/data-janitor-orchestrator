services:
  - type: web
    name: data-janitor-orchestrator
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    plan: starter
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: data-janitor-db
          property: connectionString

databases:
  - name: data-janitor-db
    plan: free
